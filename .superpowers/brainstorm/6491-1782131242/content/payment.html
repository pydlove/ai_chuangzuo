<div style="width: 180px; height: 180px; background: repeating-linear-gradient(0deg, #1a1a1a 0px, #1a1a1a 4px, transparent 4px, transparent 10px), repeating-linear-gradient(90deg, #1a1a1a 0px, #1a1a1a 4px, transparent 4px, transparent 10px);"></div>

<button class="mock-button" onclick="location.href='order.html'" style="padding: 10px 24px; background: #fff; color: #595959; border: 1px solid #d9d9d9; border-radius: 8px;">更换支付方式</button>

<button class="mock-button" onclick="location.href='order.html'" style="width: 100%; padding: 12px; background: #fff; color: #595959; border: 1px solid #d9d9d9; border-radius: 8px;">更换支付方式</button>
