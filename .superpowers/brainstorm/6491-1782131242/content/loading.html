<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
<h2 style="font-size: 18px; margin: 0; color: #1a1a1a;">生成队列</h2>
<button onclick="location.href='create.html'" style="padding: 8px 14px; background: #07c160; color: #fff; border: none; border-radius: 6px; font-size: 13px;">+ 去创作</button>
</div>

<!-- 统计卡片 -->
<div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px;">
<div style="background: #fff; border-radius: 10px; padding: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); text-align: center; border-top: 2px solid #fa8c16;">

</div>
<div style="background: #fff; border-radius: 10px; padding: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); text-align: center; border-top: 2px solid #1677ff;">
<div id="mobile-stat-generating" style="font-size: 20px; font-weight: 700; color: #1a1a1a;">0</div>
<div style="font-size: 12px; color: #8c8c8c; margin-top: 2px;">生成中</div>
</div>
<div style="background: #fff; border-radius: 10px; padding: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); text-align: center; border-top: 2px solid #07c160;">
<div id="mobile-stat-completed" style="font-size: 20px; font-weight: 700; color: #1a1a1a;">0</div>
<div style="font-size: 12px; color: #8c8c8c; margin-top: 2px;">已完成</div>
</div>
</div>

<div style="font-size: 15px; font-weight: 700; color: #1a1a1a; margin-bottom: 10px; display: flex; align-items: center; gap: 6px;">
<span style="width: 6px; height: 6px; background: #1677ff; border-radius: 50%;"></span>
生成中
</div>
<div id="mobile-generating-list"></div>
</div>

<script src="shared.js?v=8"></script>
<script>
  function renderLoadingPage() {
    var queue = getGenerationQueue();
    var queued = queue.filter(function(t) { return t.status === 'queued'; });
    var generating = queue.filter(function(t) { return t.status === 'generating'; });
    var completed = queue.filter(function(t) { return t.status === 'completed'; });

    // 更新统计
    document.getElementById('pc-stat-queued').textContent = queued.length;
    document.getElementById('pc-stat-generating').textContent = generating.length;
    document.getElementById('pc-stat-completed').textContent = completed.length;
    document.getElementById('mobile-stat-queued').textContent = queued.length;
    document.getElementById('mobile-stat-generating').textContent = generating.length;
    document.getElementById('mobile-stat-completed').textContent = completed.length;

    // 渲染各状态列表
    renderLoadingList('pc-generating-list', generating, 'generating');
    renderLoadingList('pc-queued-list', queued, 'queued');
    renderLoadingList('pc-completed-list', completed, 'completed');
    renderLoadingList('mobile-generating-list', generating, 'generating');
    renderLoadingList('mobile-queued-list', queued, 'queued');
    renderLoadingList('mobile-completed-list', completed, 'completed');
  }

  function renderLoadingList(containerId, tasks, status) {
    var container = document.getElementById(containerId);
    if (!container) return;
    container.innerHTML = '';

    if (tasks.length === 0) {
      container.innerHTML = '<div style="color:#8c8c8c;font-size:13px;padding:16px;background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.05);">暂无' + (status === 'queued' ? '排队中' : status === 'generating' ? '生成中' : '已完成') + '任务</div>';
      return;
    }

    tasks.forEach(function(task) {
      var isMobile = containerId.indexOf('mobile') >= 0;
      var el = document.createElement('div');
      el.style.cssText = isMobile
        ? 'background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); margin-bottom: 12px;'
        : 'background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center;';

      var statusStyle = getQueueStatusStyle(task.status);
      var statusText = task.status === 'completed' ? '已完成' : task.status === 'generating' ? '生成中' : '排队中';

      var progressHtml = '';
      if (task.status === 'generating') {
        progressHtml = '<div style="margin-top:8px;height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden;' + (isMobile ? '' : 'max-width:300px;') + '"><div style="height:100%;background:#1677ff;width:' + Math.round(task.progress) + '%;transition:width 0.3s ease;"></div></div>';
      }

      var actionHtml = '';
      if (task.status === 'queued') {
        actionHtml = '<button onclick="cancelGenerationTask(\'' + task.id + '\')" style="' + (isMobile ? 'flex: 1; padding: 8px; background: #fff; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 13px; color: #ff4d4f; cursor: pointer;' : 'padding: 8px 14px; background: #fff; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 13px; color: #ff4d4f; cursor: pointer;') + '">取消排队</button>';
      } else if (task.status === 'completed') {
        actionHtml = '<button onclick="location.href=\'preview.html?id=' + task.id + '\'" style="' + (isMobile ? 'flex: 1; padding: 8px; background: #07c160; border: none; border-radius: 6px; font-size: 13px; color: #fff; cursor: pointer;' : 'padding: 8px 14px; background: #07c160; border: none; border-radius: 6px; font-size: 13px; color: #fff; cursor: pointer;') + '">预览</button>';
      } else {
        actionHtml = '<span style="color: #8c8c8c; font-size: 13px;">请稍候…</span>';
      }

      if (isMobile) {
        el.innerHTML =
          '<div style="font-weight: 600; font-size: 15px; margin-bottom: 6px; color: #1a1a1a;">' + task.title + '</div>' +
          '<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">' +
            '<span style="display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:500;background:' + statusStyle.bg + ';color:' + statusStyle.color + ';">' + statusText + '</span>' +
            '<span style="color: #8c8c8c; font-size: 12px;">' + task.wordCount + ' 字 · ' + task.style + ' · ' + getQueueTimeLabel(task) + '</span>' +
          '</div>' +
          progressHtml +
          '<div style="display: flex; gap: 8px; margin-top: 12px;">' + actionHtml + '</div>';
      } else {
        el.innerHTML =
          '<div>' +
            '<div style="font-weight: 600; font-size: 16px; margin-bottom: 6px; color: #1a1a1a;">' + task.title + '</div>' +
            '<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">' +
              '<span style="display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:500;background:' + statusStyle.bg + ';color:' + statusStyle.color + ';">' + statusText + '</span>' +
              '<span style="color: #8c8c8c; font-size: 13px;">' + task.wordCount + ' 字 · ' + task.style + ' · ' + getQueueTimeLabel(task) + '</span>' +
            '</div>' +
            progressHtml +
          '</div>' +
          '<div>' + actionHtml + '</div>';
      }

      container.appendChild(el);
    });
  }

  // 页面加载时立即渲染
  document.addEventListener('DOMContentLoaded', function() {
    renderLoadingPage();
  });

  // 队列变化时重新渲染
  window.addEventListener('storage', function(e) {
    if (e.key === 'aichuangzuo_generation_queue') {
      renderLoadingPage();
    }
  });

  // 定时刷新当前页
  setInterval(renderLoadingPage, 500);
</script>
</body>
</html>
