<style>
  /* Product mode: when embedded in console iframe */
  body.product-mode {
    background: var(--bg-color);
  }
  body.product-mode .prototype-frame {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  body.product-mode .section,
  body.product-mode .prototype-nav,
  body.product-mode .mockup-app-header,
  body.product-mode .mockup-header,
  body.product-mode .global-footer,
  body.product-mode .mockup-mobile {
    display: none !important;
  }
  body.product-mode .pc-mobile-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    padding: 0;
    gap: 0;
  }
  body.product-mode .mockup {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    height: 100%;
    border: none;
    border-radius: 0;
    box-shadow: none;
  }
  body.product-mode .mockup-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    height: 100%;
    background: var(--bg-color);
  }
  body.product-mode .pc-content-wrapper {
    flex: 1;
    display: flex !important;
    flex-direction: column !important;
    max-width: none !important;
    margin: 0 !important;
    padding: 0 !important;
    box-sizing: border-box !important;
    min-height: 0;
    height: 100%;
  }
  body.product-mode .queue-page {
    max-width: none;
    padding: 0;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  }
  body.product-mode .queue-table-wrap { display: block; }
  body.product-mode .queue-mobile-list { display: none; }
  @media (max-width: 640px) {
    body.product-mode .queue-table-wrap { display: none; }
    body.product-mode .queue-mobile-list { display: block; }
    body.product-mode .queue-page { padding: 16px; }
    body.product-mode .queue-header { flex-direction: column; gap: 12px; align-items: flex-start; }
  }
  /* Queue page — console-aligned */
  .queue-page {
    max-width: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .queue-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 24px;
    background: var(--card-bg);
    gap: 16px;
  }
  .queue-header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .queue-header h2 {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-color);
    margin: 0;
  }
  .queue-search {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    background: var(--bg-color);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    min-width: 200px;
  }
  .queue-search input {
    border: none;
    background: none;
    outline: none;
    font-size: 13px;
    color: var(--text-color);
    width: 100%;
    height: 20px;
  }
  .queue-search input::placeholder {
    color: var(--text-secondary);
  }
  .queue-search-icon {
    color: var(--text-secondary);
    flex-shrink: 0;
  }
  .queue-cta {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 7px 16px;
    background: var(--primary-color);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.15s;
  }
  .queue-cta:hover {
    background: #06ad56;
  }
  /* Filter tabs */
  .queue-tabs {
    display: flex;
    gap: 4px;
    padding: 12px 24px;
    background: var(--card-bg);
  }
  .queue-tab {
    padding: 6px 14px;
    font-size: 13px;
    color: var(--text-secondary);
    border: none;
    background: none;
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 500;
  }
  .queue-tab:hover {
    color: var(--text-color);
    background: var(--bg-color);
  }
  .queue-tab.active {
    color: var(--primary-color);
    background: rgba(7,193,96,0.08);
  }
  .queue-tab-count {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 18px;
    height: 18px;
    padding: 0 5px;
    border-radius: 9px;
    font-size: 11px;
    font-weight: 700;
    margin-left: 5px;
    background: var(--border-color);
    color: var(--text-secondary);
  }
  .queue-tab.active .queue-tab-count {
    background: rgba(7,193,96,0.15);
    color: var(--primary-color);
  }
  /* Table */
  .queue-table-wrap {
    background: var(--card-bg);
    border-radius: 0 0 0 0;
    overflow: hidden;
  }
  .queue-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .queue-table th {
    text-align: left;
    padding: 10px 16px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-secondary);
    background: var(--card-bg);
    white-space: nowrap;
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }
  .queue-table td {
    padding: 14px 16px;
    color: var(--text-color);
    vertical-align: middle;
  }
  .queue-table tbody tr {
    transition: background 0.12s;
  }
  .queue-table tbody tr:hover td { background: rgba(7,193,96,0.03); }
  .queue-table .col-title { max-width: 280px; }
  .queue-table .col-title-cell {
    display: flex;
    align-items: center;
    gap: 0;
  }
  .queue-title-text { overflow: hidden; }
  .queue-title-main {
    font-weight: 600;
    color: var(--text-color);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 220px;
    display: block;
    font-size: 13px;
  }
  .queue-title-sub {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 3px;
  }
  .queue-table .col-status { white-space: nowrap; }
  .queue-table .col-meta {
    white-space: nowrap;
    color: var(--text-secondary);
    font-size: 12px;
  }
  .queue-table .col-progress { width: 140px; }
  .queue-table .col-time {
    white-space: nowrap;
    color: var(--text-secondary);
    font-size: 12px;
  }
  .queue-table .col-action { white-space: nowrap; text-align: right; }
  /* Status badge */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }
  .status-badge.generating {
    background: rgba(7,193,96,0.1);
    color: #07c160;
  }
  .status-badge.waiting {
    background: rgba(250,173,20,0.12);
    color: #d48806;
  }
  .status-badge.done {
    background: rgba(24,144,255,0.1);
    color: #1890ff;
  }
  .status-badge.failed {
    background: rgba(255,77,79,0.1);
    color: #ff4d4f;
  }
  .status-badge .badge-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor;
  }
  .status-badge.generating .badge-dot {
    animation: blink 1.2s infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  /* Progress bar */
  .progress-bar { display: flex; align-items: center; gap: 10px; }
  .progress-track {
    flex: 1;
    height: 5px;
    background: var(--border-color);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #07c160, #06ad56);
    border-radius: 3px;
    transition: width 0.4s ease;
  }
  .progress-pct {
    font-size: 11px;
    color: var(--text-secondary);
    min-width: 30px;
    text-align: right;
    font-weight: 500;
  }
  /* Action buttons */
  .queue-action {
    display: inline-flex;
    align-items: center;
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    background: var(--card-bg);
    color: var(--text-color);
    transition: all 0.15s;
    gap: 4px;
  }
  .queue-action:hover {
    color: var(--primary-color);
    background: rgba(7,193,96,0.04);
  }
  .queue-action.cancel {
    color: #ff4d4f;
  }
  .queue-action.cancel:hover {
    background: #fff2f0;
    color: #ff4d4f;
  }
  .queue-action.done {
    background: var(--primary-color);
    color: #fff;
  }
  .queue-action.done:hover {
    background: #06ad56;
    color: #fff;
  }
  .queue-waiting { font-size: 12px; color: var(--text-secondary); }
  /* Empty state */
  .queue-empty {
    padding: 64px 24px;
    text-align: center;
    background: var(--card-bg);
  }
  .queue-empty-icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.35;
  }
  .queue-empty p {
    margin: 0 0 6px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-color);
  }
  .queue-empty small {
    font-size: 13px;
    color: var(--text-secondary);
  }
  /* Mobile card list */
  .queue-mobile-list { display: none; }
  .queue-mobile-card {
    background: var(--card-bg);
    padding: 16px;
    margin-bottom: 12px;
  }
  .queue-mobile-card:last-child { margin-bottom: 0; }
  .queue-mobile-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-color);
    margin-bottom: 8px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .queue-mobile-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .queue-mobile-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    align-items: center;
  }
  @media (max-width: 700px) {
    .queue-tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .queue-table-wrap { display: none; }
    .queue-mobile-list { display: block; }
    .queue-header { padding: 16px; }
    .queue-tabs { padding: 10px 16px; }
  }
  body[data-theme="dark"] .progress-fill { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
</style>

<script>
  var queueActiveFilter = 'all';
  var queueSearchKeyword = '';

  function setQueueFilter(filter) {
    queueActiveFilter = filter;
    document.querySelectorAll('.queue-tab').forEach(function(t) {
      t.classList.toggle('active', t.dataset.filter === filter);
    });
    renderQueuePage();
  }

  function onQueueSearch(keyword) {
    queueSearchKeyword = keyword.trim().toLowerCase();
    renderQueuePage();
  }

  function renderQueuePage() {
    var queue = typeof getGenerationQueue === 'function' ? getGenerationQueue() : [];
    var all = queue;
    var generating = queue.filter(function(t) { return t.status === 'generating'; });
    var queued = queue.filter(function(t) { return t.status === 'queued'; });
    var completed = queue.filter(function(t) { return t.status === 'completed'; });

    document.getElementById('count-all').textContent = all.length;
    document.getElementById('count-generating').textContent = generating.length;
    document.getElementById('count-queued').textContent = queued.length;
    document.getElementById('count-completed').textContent = completed.length;

    var filtered = queueActiveFilter === 'all' ? queue
      : queueActiveFilter === 'generating' ? generating
      : queueActiveFilter === 'queued' ? queued
      : completed;

    if (queueSearchKeyword) {
      filtered = filtered.filter(function(t) {
        return (t.title || '').toLowerCase().indexOf(queueSearchKeyword) !== -1;
      });
    }

    var tbody = document.getElementById('queue-tbody');
    var empty = document.getElementById('queue-empty');
    var tableWrap = document.querySelector('.queue-table-wrap');
    var mobileList = document.getElementById('queue-mobile-list');

    if (filtered.length === 0) {
      tbody.innerHTML = '';
      empty.style.display = 'block';
      tableWrap.querySelector('.queue-table').style.display = 'none';
    } else {
      empty.style.display = 'none';
      tableWrap.querySelector('.queue-table').style.display = 'table';
      renderTableRows(tbody, filtered, false);
    }

    renderMobileCards(mobileList, filtered);
  }

  function renderTableRows(container, tasks, isMobile) {
    container.innerHTML = '';
    tasks.forEach(function(task) {
      var tr = document.createElement('tr');

      var statusLabel = task.status === 'completed' ? '已完成' : task.status === 'generating' ? '生成中' : '排队中';
      var timeLabel = typeof getQueueTimeLabel === 'function' ? getQueueTimeLabel(task) : '';

      var progressHtml = '';
      if (task.status === 'generating') {
        progressHtml = '<div class="progress-bar"><div class="progress-track"><div class="progress-fill" style="width:' + Math.round(task.progress || 0) + '%"></div></div><span class="progress-pct">' + Math.round(task.progress || 0) + '%</span></div>';
      } else if (task.status === 'completed') {
        progressHtml = '<span style="color:var(--primary-color);font-size:14px;">✓</span>';
      } else {
        progressHtml = '<span style="color:var(--text-secondary);">—</span>';
      }

      var actionHtml = '';
      if (task.status === 'queued') {
        actionHtml = '<button class="queue-action cancel" onclick="cancelQueueTask(\'' + task.id + '\')">取消</button>';
      } else if (task.status === 'generating') {
        actionHtml = '<span class="queue-waiting">请稍候…</span>';
      } else {
        actionHtml = '<button class="queue-action done" onclick="openQueuePreview(\'' + task.id + '\')">预览</button>';
      }

      tr.innerHTML =
        '<td class="col-title"><div class="col-title-cell"><div class="queue-title-text"><span class="queue-title-main" title="' + task.title + '">' + task.title + '</span><div class="queue-title-sub">' + (task.wordCount || 1500) + ' 字 · ' + (task.style || '年度总结') + '</div></div></div></td>' +
        '<td class="col-status"><span class="status-badge ' + task.status + '"><span class="badge-dot"></span>' + statusLabel + '</span></td>' +
        '<td class="col-meta">' + (task.template || '公众号标准模板') + '</td>' +
        '<td class="col-progress">' + progressHtml + '</td>' +
        '<td class="col-time">' + timeLabel + '</td>' +
        '<td class="col-action">' + actionHtml + '</td>';

      container.appendChild(tr);
    });
  }

  function renderMobileCards(container, tasks) {
    container.innerHTML = '';
    tasks.forEach(function(task) {
      var statusLabel = task.status === 'completed' ? '已完成' : task.status === 'generating' ? '生成中' : '排队中';
      var timeLabel = typeof getQueueTimeLabel === 'function' ? getQueueTimeLabel(task) : '';

      var progressHtml = '';
      if (task.status === 'generating') {
        progressHtml = '<div style="margin-top:8px;"><div class="progress-bar"><div class="progress-track" style="flex:1;"><div class="progress-fill" style="width:' + Math.round(task.progress || 0) + '%"></div></div><span class="progress-pct">' + Math.round(task.progress || 0) + '%</span></div></div>';
      }

      var actionHtml = '';
      if (task.status === 'queued') {
        actionHtml = '<button class="queue-action cancel" onclick="cancelQueueTask(\'' + task.id + '\')">取消</button>';
      } else if (task.status === 'generating') {
        actionHtml = '<span class="queue-waiting">请稍候…</span>';
      } else {
        actionHtml = '<button class="queue-action done" onclick="openQueuePreview(\'' + task.id + '\')">预览</button>';
      }

      var card = document.createElement('div');
      card.className = 'queue-mobile-card';
      card.innerHTML =
        '<div class="queue-mobile-title">' + task.title + '</div>' +
        '<div class="queue-mobile-meta">' +
          '<span class="status-badge ' + task.status + '" style="font-size:11px;padding:2px 8px;"><span class="badge-dot"></span>' + statusLabel + '</span>' +
          '<span>' + (task.wordCount || 1500) + ' 字</span>' +
          '<span>' + timeLabel + '</span>' +
        '</div>' +
        progressHtml +
        '<div class="queue-mobile-actions">' + actionHtml + '</div>';
      container.appendChild(card);
    });
  }

  function cancelQueueTask(taskId) {
    if (typeof cancelGenerationTask === 'function') {
      cancelGenerationTask(taskId);
    } else {
      var queue = typeof getGenerationQueue === 'function' ? getGenerationQueue() : [];
      queue = queue.filter(function(t) { return t.id !== taskId; });
      if (typeof saveGenerationQueue === 'function') saveGenerationQueue(queue);
    }
    renderQueuePage();
  }

  function openQueuePreview(taskId) {
    consoleNavigate('preview', 'preview.html?id=' + taskId);
  }

  document.addEventListener('DOMContentLoaded', function() {
    if (typeof updateNotificationBadge === 'function') updateNotificationBadge();
    renderQueuePage();

    // Auto-refresh
    setInterval(renderQueuePage, 2000);

    // React to storage changes
    window.addEventListener('storage', function(e) {
      if (e.key === 'aichuangzuo_generation_queue') renderQueuePage();
    });

    // Product mode detection
    if (window.self !== window.top) {
      document.body.classList.add('product-mode');
    }
  });
</script>
</body>
</html>
