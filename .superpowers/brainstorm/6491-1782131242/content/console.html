<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>控制台 - 爱创作</title>
<link rel="stylesheet" href="shared.css?v=14">
<style>
  html, body { height: 100%; margin: 0; overflow: hidden; }
  .console-layout { height: 100%; }
  .console-footer {
    padding: 12px 24px;
    border-top: 1px solid var(--border-color);
    color: var(--text-secondary);
    font-size: 12px;
    text-align: center;
    background: var(--header-bg);
    flex-shrink: 0;
  }
  .console-footer span + span::before {
    content: '|';
    margin: 0 12px;
    color: var(--border-color);
  }
  .console-icon {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    stroke-width: 1.8;
  }
  .console-icon-btn .console-icon {
    width: 18px;
    height: 18px;
  }
</style>
</head>
<body>
<div class="console-layout">
  <aside class="console-sidebar">
    <div class="console-sidebar-brand"><img src="https://minimax-algeng-chat-tts.oss-cn-wulanchabu.aliyuncs.com/ccv2%2F2026-06-30%2FMiniMax-M2.7%2F2030872676720972498%2Fbebea9490041c27ff57a8047a061b67b2c91b9f300dc46692afb570e560d69e6..png?Expires=1782885611&OSSAccessKeyId=LTAI5tGLnRTkBjLuYPjNcKQ8&Signature=FXztlEIbzv8CsjALl4eqwlaUoFA%3D" alt="爱创作" style="height:28px;vertical-align:middle;margin-right:8px;"><span style="color:#000;font-weight:600;">爱创作</span></div>
    <nav class="console-sidebar-nav">
      <a class="console-sidebar-item active" href="#" data-tab="create" onclick="switchConsoleTab('create'); return false;">
        <svg class="console-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg> 创作
      </a>
      <a class="console-sidebar-item" href="#" data-tab="queue" onclick="switchConsoleTab('queue'); return false;">
        <svg class="console-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> 生成队列
      </a>
      <a class="console-sidebar-item" href="#" data-tab="preview" onclick="switchConsoleTab('preview'); return false;">
        <svg class="console-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg> 预览导出
      </a>
      <a class="console-sidebar-item" href="#" data-tab="works" onclick="switchConsoleTab('works'); return false;">
        <svg class="console-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg> 我的作品
      </a>
    </nav>
  </aside>

  <div class="console-main">
    <header class="console-header">
      <div class="console-header-left">
        <div class="console-avatar" onclick="toggleUserMenu()">U</div>
        <div class="console-membership-badge" onclick="openMembershipModal()">会员</div>
        <div class="console-user-menu" id="console-user-menu">
          <a href="settings.html">个人中心</a>
          <a href="login.html">退出登录</a>
        </div>
      </div>
      <div class="console-header-center">爱创作</div>
      <div class="console-header-right">
        <button class="console-icon-btn" onclick="openMessageModal()" title="消息"><svg class="console-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9z"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="notification-badge"></span></button>
        <button class="console-icon-btn" onclick="openTutorialModal()" title="教程"><svg class="console-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></button>
        <button class="console-icon-btn" onclick="toggleTheme()" title="切换主题"><svg class="console-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
        <button class="console-icon-btn" onclick="openFeedbackModal()" title="反馈"><svg class="console-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></button>
        <button class="console-icon-btn" onclick="openAboutModal()" title="关于我们"><svg class="console-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg></button>
      </div>
    </header>

    <div class="console-content">
      <div class="console-tab-section active" data-tab="create">
        <iframe class="console-content-frame" src="create.html?embed=1&v=17" title="创作"></iframe>
      </div>

      <div class="console-tab-section" data-tab="queue">
        <iframe class="console-content-frame" src="loading.html?embed=1&v=18" title="生成队列"></iframe>
      </div>

      <div class="console-tab-section" data-tab="preview">
        <iframe class="console-content-frame" src="preview.html?embed=1&v=12" title="预览导出"></iframe>
      </div>

      <div class="console-tab-section" data-tab="works">
        <iframe class="console-content-frame" src="works.html?embed=1&v=12" title="我的作品"></iframe>
      </div>
    </div>

    <footer class="console-footer">
      <span>© 2026 杭州爱启云网络科技有限公司</span>
      <span>浙ICP备XXXXXXXX号-1</span>
    </footer>
  </div>
</div>

<script src="shared.js?v=14"></script>
<script>
  function toggleUserMenu() {
    var menu = document.getElementById('console-user-menu');
    menu.classList.toggle('visible');
  }

  document.addEventListener('click', function(e) {
    var menu = document.getElementById('console-user-menu');
    var avatar = document.querySelector('.console-avatar');
    if (menu && avatar && !menu.contains(e.target) && !avatar.contains(e.target)) {
      menu.classList.remove('visible');
    }
  });

  function switchConsoleTab(tab) {
    document.querySelectorAll('.console-tab-section').forEach(function(el) {
      el.classList.toggle('active', el.dataset.tab === tab);
    });
    document.querySelectorAll('.console-sidebar-item').forEach(function(el) {
      el.classList.toggle('active', el.dataset.tab === tab);
    });
  }

  document.addEventListener('DOMContentLoaded', function() {
    initTheme();
    seedNotificationsOnLoad();
    checkMembershipNotifications();
    updateNotificationBadge();
  });
</script>
</body>
</html>
