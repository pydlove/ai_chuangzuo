server:
  port: 26060

spring:
  application:
    name: admin-api
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://localhost:3306/aichuangzuo?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    table: admin_flyway_schema_history
  mail:
    host: ${SPRING_MAIL_HOST:127.0.0.1}
    port: ${SPRING_MAIL_PORT:3025}
    username: ${SPRING_MAIL_USERNAME:test@local}
    password: ${SPRING_MAIL_PASSWORD:local-dev-no-auth}
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false
      mail.smtp.ssl.enable: false
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000

auth:
  jwt:
    access-secret: ${ADMIN_JWT_ACCESS_SECRET:please-change-this-admin-access-secret-at-least-256-bits-long}
    refresh-secret: ${ADMIN_JWT_REFRESH_SECRET:please-change-this-admin-refresh-secret-at-least-256-bits-long}
    access-expiration: 7200
    refresh-expiration: 604800

admin:
  model:
    api-key-secret: ${ADMIN_MODEL_API_KEY_SECRET:0123456789abcdef0123456789abcdef}

hot-search:
  crawl-enabled: true
  cron: "0 0 2 * * ?"
  platforms:
    - douyin
    - toutiao
    - bilibili
    - weibo
    - baidu
  top-n: 50
  connect-timeout-millis: 10000
  read-timeout-millis: 10000

user:
  api:
    base-url: ${USER_API_BASE_URL:http://localhost:25050}
    internal-key: ${USER_API_INTERNAL_KEY:default-change-me}

reminder:
  enabled: true
  advance-days: 7
  notify-hour: 9
  notify-channel: message

# 文章生成 worker 配置
generation:
  pool-size: 2            # worker 线程数
  poll-interval-ms: 500   # 空轮询间隔
  lease-minutes: 5        # lease 持续分钟（超时回收）
  worker-id: worker-1     # 单实例约定
  max-retry: 3            # 单任务最大重试
