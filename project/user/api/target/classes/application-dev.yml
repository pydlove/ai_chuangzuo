spring:
  mail:
    host: ${SPRING_MAIL_HOST:smtp.126.com}
    port: ${SPRING_MAIL_PORT:465}
    username: ${SPRING_MAIL_USERNAME:aiocloud@126.com}
    password: ${SPRING_MAIL_PASSWORD:}
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: false
      mail.smtp.ssl.enable: true
      # 本地 DLP 会用自签证书替换远端证书，仅 dev 关闭 SSL 校验
      mail.smtp.ssl.trust: ${SPRING_MAIL_SSL_TRUST:smtp.126.com}
      mail.smtp.connectiontimeout: 10000
      mail.smtp.timeout: 10000
      mail.smtp.writetimeout: 10000
  flyway:
    locations: classpath:db/migration,classpath:db/migration/local
    # 本地开发允许已应用但已删除的迁移存在，避免 untracked local 迁移重命名/删除后启动失败
    # Flyway 9.x 使用 ignore-migration-patterns 替代已废弃的 ignore-missing-migrations
    ignore-migration-patterns: "*:missing"
    # 本地开发允许乱序执行，方便在已有高版本迁移后补低版本清理脚本
    out-of-order: true

logging:
  level:
    com.aichuangzuo: INFO
